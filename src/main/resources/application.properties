# Application Configuration
spring.application.name=TaskManager-API
server.port=8080


# # MySQL Database Configuration
# spring.datasource.url=jdbc:mysql://localhost:3306/taskmanager_db
# spring.datasource.username=root
# spring.datasource.password=12345
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# For h2 db: org.hibernate.dialect.H2Dialect
# For mysql db: org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# H2 IN-MEMORY DATABASE CONFIGURATION
# Data is lost when the app stops — It is for development and testing
spring.datasource.url=jdbc:h2:mem:taskmanager_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=

# Enable H2 browser console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

